[project]
# Renamed from `synsc-context-proxy` (which still ships from the synsc-context
# repo for that product). Delphi gets its own slot so the two projects can
# version + publish independently.
name = "synsci-delphi-proxy"
version = "0.1.0"
description = "MCP proxy for Delphi — bridges stdio MCP clients (Claude Code, Cursor, Windsurf) to a Delphi HTTP API."
readme = {text = "MCP proxy for Delphi. Bridges stdio MCP clients (Claude Code, Cursor, Windsurf) to a Delphi HTTP API server, exposing 33 tools for code, research paper, and HuggingFace dataset context.", content-type = "text/markdown"}
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "InkVell" }
]
keywords = ["mcp", "ai", "code-search", "research-papers", "huggingface", "datasets", "cursor", "claude", "semantic-search"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "mcp[cli]>=1.4.1",
    "httpx>=0.27.0",
]

[project.urls]
Repository = "https://github.com/synthetic-sciences/delhpi"

[project.scripts]
synsci-delphi-proxy = "synsci_delphi_proxy:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["synsci_delphi_proxy"]
