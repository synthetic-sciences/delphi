services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synsc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synsc}
      POSTGRES_DB: ${POSTGRES_DB:-synsc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/supabase/setup_local.sql:/docker-entrypoint-initdb.d/01-setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synsc} -d ${POSTGRES_DB:-synsc}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      target: api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-synsc}:${POSTGRES_PASSWORD:-synsc}@postgres:5432/${POSTGRES_DB:-synsc}
      SYNSC_API_HOST: "0.0.0.0"
      SYNSC_API_PORT: "8742"
      SYNSC_LOG_FORMAT: json
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8742:8742"

  worker:
    build:
      context: ./backend
      target: worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-synsc}:${POSTGRES_PASSWORD:-synsc}@postgres:5432/${POSTGRES_DB:-synsc}
      SYNSC_LOG_FORMAT: json
      SYNSC_WORKER_THREADS: "4"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8742
    ports:
      - "3000:3000"

volumes:
  pgdata:
